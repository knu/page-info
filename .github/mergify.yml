queue_rules:
  - name: dependency-updates
    batch_size: 5
    batch_max_wait_time: 10 min
    checks_timeout: auto
    merge_method: merge-batch
    queue_conditions:
      - base = main
      - author ~= ^(dependabot|renovate)\[bot\]$
      - -draft
      - -conflict
      - "#approved-reviews-by >= 1"
    merge_conditions:
      - "#approved-reviews-by >= 1"

merge_protections_settings:
  auto_merge_conditions:
    - base = main
    - author ~= ^(dependabot|renovate)\[bot\]$
    - -draft
    - -conflict
    - "#approved-reviews-by >= 1"
  reporting_method: check-runs
